#################################
#       Shadow Settings         #
#################################
shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-color = "#000000"

#################################
#           Fading              #
#################################
fading = false;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
no-fading-openclose = false;
no-fading-destroyed-argb = false;

#################################
#         Transparency          #
#################################
frame-opacity = 0.7;

#################################
#         Corner Radius         #
#################################
corner-radius = 10.0;
round-borders = 1;
round-borders-exclude = [];

#################################
#        Background Blur        #
#################################
blur: {
  method = "dual_kawase";
  strength = 10;
};

blur-background = true;
blur-background-frame = true;

#################################
#       General Settings        #
#################################
backend = "glx";
vsync = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
no-use-damage = true;

#################################
#             Rules             #
#################################
# NOTE (picom v13): when a `rules:` block is present, ALL old-style rule
# options (opacity-rule, *-exclude, inactive/active-opacity, mark-*-focused,
# wintype blocks) are IGNORED. Everything below is expressed as rules so it
# actually takes effect.
rules: (
  {
    blur-background = false;
    fade = false;
  },

  {
    match = "window_type = 'normal'";
    fade = true;
    shadow = true;
  },

  {
    match = "window_type = 'dialog'";
    shadow = true;
  },

  {
    match = "window_type = 'tooltip'";
    corner-radius = 0;
    opacity = 0.90;
    shadow = false;
  },

  {
    match = "fullscreen";
    corner-radius = 0;
  },

  {
    match = "window_type = 'dock'";
    corner-radius = 0;
    fade = true;
  },

  {
    match = "window_type = 'dropdown_menu' || window_type = 'popup_menu'";
    corner-radius = 0;
    opacity = 0.8;
    shadow = false;
  },

  {
    match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
    shadow = false;
  },

  {
    match = "class_g = 'Alacritty' || class_g = 'kitty' || class_g = 'FloaTerm'";
    opacity = 1.0;
    blur-background = false;
  },

  # ---- migrated from opacity-rule (only non-1.0 values matter) ----
  { match = "class_g = 'Bar'";     opacity = 0.80; focus = false; },
  { match = "class_g = 'Polybar'"; opacity = 0.80; corner-radius = 0; },
  { match = "class_g = 'st'";      opacity = 0.70; },
  { match = "class_g = 'Joplin'";  opacity = 0.90; },

  # ---- migrated from focus-exclude ----
  { match = "class_g = 'Cairo-clock'"; focus = false; },
  { match = "class_g = 'slop'";        focus = false; fade = false; },

  # ---- migrated from rounded-corners-exclude ----
  { match = "class_g = 'awesome'";     corner-radius = 0; },
  { match = "class_g = 'URxvt'";       corner-radius = 0; },
  { match = "class_g = 'XTerm'";       corner-radius = 0; },
  { match = "class_g = 'code-oss'";    corner-radius = 0; },
  { match = "class_g = 'Thunderbird'"; corner-radius = 0; },

  @include "picom-animations.conf"
)
